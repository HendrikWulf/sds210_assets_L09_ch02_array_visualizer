<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NumPy Array Slicing & Masking</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }
        h1 {
            margin-top: 0;
            color: #2c3e50;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            text-align: center;
            max-width: 600px;
        }
        .app-container {
            display: flex;
            gap: 40px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            flex-wrap: wrap;
            justify-content: center;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 250px;
        }
        .control-group {
            background: #f1f3f5;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }
        .control-group h3 {
            margin: 0 0 15px 0;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .input-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .input-row:last-child {
            margin-bottom: 0;
        }
        input[type="number"] {
            width: 60px;
            padding: 6px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
        }
        input[type="radio"] {
            transform: scale(1.2);
            cursor: pointer;
        }
        .grid-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 60px);
            grid-template-rows: repeat(5, 60px);
            gap: 6px;
            background: #e9ecef;
            padding: 6px;
            border-radius: 8px;
        }
        .cell {
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
            font-size: 18px;
            color: #adb5bd;
            border-radius: 4px;
            transition: all 0.2s ease;
        }
        .cell.active {
            background: #0d6efd;
            color: white;
            font-weight: bold;
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(13, 110, 253, 0.3);
            z-index: 2;
        }
        .code-display {
            background: #212529;
            color: #f8f9fa;
            padding: 15px 20px;
            border-radius: 8px;
            font-family: "Courier New", Courier, monospace;
            font-size: 18px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }
        .code-comment {
            color: #6c757d;
            font-size: 14px;
            margin-bottom: 5px;
            display: block;
        }
        /* Disable inactive group visually */
        .disabled-group {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <h1>Interactive NumPy Visualizer</h1>
    <p>Select a mode to dynamically explore how array slicing and boolean masking extract specific data from a 2D grid.</p>

    <div class="app-container">
        
        <div class="controls">
            
            <div class="control-group" id="group-slice">
                <h3>
                    <input type="radio" name="mode" id="mode-slice" value="slice" checked onchange="toggleMode()">
                    <label for="mode-slice">Index & Slicing</label>
                </h3>
                <div class="input-row">
                    <label for="row-start">Row Start (0-5):</label>
                    <input type="number" id="row-start" value="1" min="0" max="5" onchange="updateGrid()">
                </div>
                <div class="input-row">
                    <label for="row-end">Row End (0-5):</label>
                    <input type="number" id="row-end" value="4" min="0" max="5" onchange="updateGrid()">
                </div>
                <div class="input-row">
                    <label for="col-start">Col Start (0-5):</label>
                    <input type="number" id="col-start" value="1" min="0" max="5" onchange="updateGrid()">
                </div>
                <div class="input-row">
                    <label for="col-end">Col End (0-5):</label>
                    <input type="number" id="col-end" value="4" min="0" max="5" onchange="updateGrid()">
                </div>
            </div>

            <div class="control-group disabled-group" id="group-mask">
                <h3>
                    <input type="radio" name="mode" id="mode-mask" value="mask" onchange="toggleMode()">
                    <label for="mode-mask">Boolean Masking</label>
                </h3>
                <div class="input-row">
                    <label for="threshold">Values greater than:</label>
                    <input type="number" id="threshold" value="15" min="0" max="25" onchange="updateGrid()">
                </div>
            </div>

        </div>

        <div class="grid-section">
            <div class="grid" id="grid">
                </div>
            
            <div class="code-display">
                <span class="code-comment"># Python / NumPy Equivalent:</span>
                <div id="code-output">grid[1:4, 1:4]</div>
            </div>
        </div>

    </div>

    <script>
        const gridEl = document.getElementById('grid');
        const size = 5;

        // Initialize the 5x5 visual grid (values 1 to 25)
        function initGrid() {
            let value = 1;
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    let cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${r}-${c}`;
                    cell.innerText = value;
                    cell.dataset.value = value;
                    gridEl.appendChild(cell);
                    value++;
                }
            }
        }

        // Toggle UI between Slicing and Masking
        function toggleMode() {
            const isSlice = document.getElementById('mode-slice').checked;
            document.getElementById('group-slice').classList.toggle('disabled-group', !isSlice);
            document.getElementById('group-mask').classList.toggle('disabled-group', isSlice);
            updateGrid();
        }

        // Format the slicing string cleanly (e.g. "1:4", ":", "2:")
        function formatSlice(start, end, maxDim) {
            if (start === 0 && end === maxDim) return ":";
            let sStr = start === 0 ? "" : start;
            let eStr = end === maxDim ? "" : end;
            
            // If it's selecting exactly one specific index (e.g., start 2, end 3), return just "2"
            if (end - start === 1 && sStr !== "" && eStr !== "") {
                return start.toString(); 
            }
            return `${sStr}:${eStr}`;
        }

        // Update highlights and Python code based on state
        function updateGrid() {
            const isSlice = document.getElementById('mode-slice').checked;
            
            // Clear all current highlights
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));

            let codeStr = "";

            if (isSlice) {
                // Get slice bounds
                let rStart = parseInt(document.getElementById('row-start').value);
                let rEnd = parseInt(document.getElementById('row-end').value);
                let cStart = parseInt(document.getElementById('col-start').value);
                let cEnd = parseInt(document.getElementById('col-end').value);

                // Enforce logic (end must be >= start)
                if (rEnd < rStart) { rEnd = rStart; document.getElementById('row-end').value = rEnd; }
                if (cEnd < cStart) { cEnd = cStart; document.getElementById('col-end').value = cEnd; }

                // Apply highlights
                for (let r = 0; r < size; r++) {
                    for (let c = 0; c < size; c++) {
                        if (r >= rStart && r < rEnd && c >= cStart && c < cEnd) {
                            document.getElementById(`cell-${r}-${c}`).classList.add('active');
                        }
                    }
                }

                // Generate Python code string
                let rStr = formatSlice(rStart, rEnd, size);
                let cStr = formatSlice(cStart, cEnd, size);
                
                // If entire array is selected
                if (rStr === ":" && cStr === ":") {
                    codeStr = "grid[:, :]";
                } else if (cStr === ":" && !rStr.includes(':')) {
                    // Just selecting a specific row
                    codeStr = `grid[${rStr}, :]`;
                } else {
                    codeStr = `grid[${rStr}, ${cStr}]`;
                }

            } else {
                // Get boolean threshold
                let threshold = parseInt(document.getElementById('threshold').value);

                // Apply highlights
                document.querySelectorAll('.cell').forEach(c => {
                    if (parseInt(c.dataset.value) > threshold) {
                        c.classList.add('active');
                    }
                });

                // Generate Python code string
                codeStr = `grid[grid > ${threshold}]`;
            }

            // Update code display
            document.getElementById('code-output').innerText = codeStr;
        }

        // Run initialization
        initGrid();
        updateGrid();
    </script>
</body>
</html>
